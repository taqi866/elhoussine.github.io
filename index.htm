        .reveal-scale { opacity: 0; transform: scale(0.95); transition: all 0.8s ease; }

        .delay-100 { transition-delay: 100ms; }

        .delay-400 { transition-delay: 400ms; }

        .btn-press:active { transform: scale(0.95); }

        .animation-delay-2000 { animation-delay: 2s; }
        
        [dir="rtl"] { font-family: 'Cairo', sans-serif; }

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Initialisation des icônes
            lucide.createIcons();

            // Logique de l'écran de chargement
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if(splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.style.display = 'none', 500);
                }
                
                document.getElementById('main-header').classList.remove('opacity-0');
                document.getElementById('main-wrapper').classList.remove('opacity-0');
                
                // Déclencher les animations au chargement et au scroll
                revealElements();
                window.addEventListener('scroll', revealElements);
            }, 1000);

            // Gestion du menu mobile
            const menuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            if(menuBtn && mobileMenu) {
                menuBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                });
            }
        });

        // Fonction pour animer l'apparition des éléments
        function revealElements() {
            const reveals = document.querySelectorAll('.reveal-up, .reveal-scale');
            reveals.forEach(el => {
                const windowHeight = window.innerHeight;
                const elementTop = el.getBoundingClientRect().top;
                const elementVisible = 100;
                
                if (elementTop < windowHeight - elementVisible) {
                    el.classList.add('active');
                }
            });
        }

        // Fonctions de navigation
        function showHome() {
            document.getElementById('mobile-menu')?.classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showFormations() {
            document.getElementById('mobile-menu')?.classList.add('hidden');
            document.getElementById('formations-section').scrollIntoView({ behavior: 'smooth' });
        }

        function showContact() {
            document.getElementById('mobile-menu')?.classList.add('hidden');
            document.getElementById('about-section').scrollIntoView({ behavior: 'smooth' });
        }

        // Logique d'ouverture des cours
        function openCourse(courseName) {
            const courseView = document.getElementById('course-view');
            courseView.classList.remove('hidden');
            document.getElementById('course-iframe-mock').classList.add('hidden');
            
            // Délai simulé pour effet de chargement
            setTimeout(() => {
                document.getElementById('course-title').innerText = "Module : " + courseName;
                document.getElementById('course-iframe-mock').classList.remove('hidden');
            }, 800);
        }

        function closeCourse() {
            document.getElementById('course-view').classList.add('hidden');
            document.getElementById('course-iframe-mock').classList.add('hidden');
            document.getElementById('course-title').innerText = "Titre";
        }

        let currentLang = 'fr';
        
        function toggleLanguage() {
            const label = document.getElementById('lang-label');
            
            if(currentLang === 'fr') {
                currentLang = 'ar';
                label.innerText = 'FR';
                document.documentElement.setAttribute('dir', 'rtl');
                document.documentElement.setAttribute('lang', 'ar');
            } else {
                currentLang = 'fr';
                label.innerText = 'العربية';
                document.documentElement.setAttribute('dir', 'ltr');
                document.documentElement.setAttribute('lang', 'fr');
            }
            
            // Appliquer les traductions
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(translations[currentLang][key]) {
                    el.innerHTML = translations[currentLang][key];
                }
            });
            
            // Re-générer les icônes après changement de DOM
            lucide.createIcons();
        }
